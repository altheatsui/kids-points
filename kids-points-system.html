<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="集點系統">
<title>⭐ 寶貝集點系統</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">

<style>
  :root {
    --rey-color: #3DBFA8;
    --rey-light: #E8F8F5;
    --rey-dark: #2A8A7A;
    --mika-color: #F97BA0;
    --mika-light: #FEF0F4;
    --mika-dark: #C45575;
    --gold: #F5C842;
    --gold-light: #FEF9E7;
    --bg: #F7F8FC;
    --card: #FFFFFF;
    --text: #1A1D27;
    --text-sub: #6B7280;
    --text-muted: #9CA3AF;
    --border: #E5E7EB;
    --danger: #EF4444;
    --danger-light: #FEF2F2;
    --success: #10B981;
    --success-light: #ECFDF5;
    --radius: 16px;
    --radius-sm: 10px;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-md: 0 4px 24px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Noto Sans TC', 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── PAGES ── */
  .page { display: none; min-height: 100vh; }
  .page.active { display: flex; flex-direction: column; }

  /* ── SETUP PAGE ── */
  #page-setup {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    align-items: center; justify-content: center; padding: 24px;
  }
  .setup-card {
    background: #fff; border-radius: 24px; padding: 32px 28px;
    width: 100%; max-width: 440px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
  }
  .setup-logo { text-align: center; margin-bottom: 24px; }
  .setup-logo .emoji { font-size: 48px; display: block; margin-bottom: 8px; }
  .setup-logo h1 { font-family: 'Nunito', sans-serif; font-size: 22px; font-weight: 900; color: var(--text); }
  .setup-logo p { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
  .setup-section { margin-bottom: 20px; }
  .setup-section-title {
    font-size: 12px; font-weight: 700; color: var(--text-sub);
    text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px;
  }
  .setup-row { display: flex; gap: 10px; }
  .form-group { flex: 1; margin-bottom: 10px; }
  .form-group label { font-size: 13px; color: var(--text-sub); display: block; margin-bottom: 5px; font-weight: 600; }
  .form-group input {
    width: 100%; padding: 11px 14px; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-family: inherit;
    color: var(--text); background: #fff; transition: border-color .2s;
    outline: none;
  }
  .form-group input:focus { border-color: #667eea; }
  .btn-setup {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #667eea, #764ba2);
    color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px;
    font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 8px;
    transition: opacity .2s, transform .1s;
  }
  .btn-setup:active { transform: scale(0.98); opacity: 0.9; }
  .divider { height: 1px; background: var(--border); margin: 6px 0 16px; }

  /* ── LOGIN PAGE ── */
  #page-login {
    background: linear-gradient(160deg, #FFDDE1 0%, #EE9CA7 100%);
    align-items: center; justify-content: center; padding: 24px;
  }
  .login-card {
    background: #fff; border-radius: 24px; padding: 32px 28px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  }
  .login-logo { text-align: center; margin-bottom: 28px; }
  .login-logo .emoji { font-size: 52px; display: block; margin-bottom: 8px; }
  .login-logo h1 { font-family: 'Nunito', sans-serif; font-size: 24px; font-weight: 900; }
  .login-logo p { font-size: 13px; color: var(--text-sub); margin-top: 4px; }
  .login-tabs { display: flex; background: var(--bg); border-radius: var(--radius-sm); padding: 4px; gap: 4px; margin-bottom: 20px; }
  .login-tab {
    flex: 1; padding: 9px; border: none; background: transparent;
    border-radius: 7px; font-size: 14px; font-weight: 700; font-family: inherit;
    cursor: pointer; color: var(--text-sub); transition: all .2s;
  }
  .login-tab.active { background: #fff; color: var(--text); box-shadow: var(--shadow); }
  .login-tab span { margin-right: 5px; }
  .btn-login {
    width: 100%; padding: 14px; background: linear-gradient(135deg, #EE9CA7, #FFDDE1);
    color: #5C2D3F; border: none; border-radius: var(--radius-sm); font-size: 15px;
    font-weight: 700; font-family: inherit; cursor: pointer; margin-top: 4px;
    transition: opacity .2s, transform .1s;
  }
  .btn-login:active { transform: scale(0.98); }
  .btn-faceid {
    width: 100%; padding: 12px; background: var(--bg);
    color: var(--text-sub); border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
    font-family: inherit; cursor: pointer; margin-top: 10px;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background .2s;
  }
  .btn-faceid:hover { background: var(--border); }
  .btn-reset-link { display: block; text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted); cursor: pointer; text-decoration: underline; }

  /* ── MAIN PAGE ── */
  #page-main { background: var(--bg); }
  .topbar {
    background: #fff; padding: 14px 20px; display: flex; align-items: center;
    justify-content: space-between; border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 1px 8px rgba(0,0,0,0.06);
  }
  .topbar-title { font-family: 'Nunito', sans-serif; font-size: 18px; font-weight: 900; }
  .topbar-user { display: flex; align-items: center; gap: 8px; }
  .topbar-avatar {
    width: 34px; height: 34px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; background: var(--gold-light);
  }
  .topbar-name { font-size: 13px; font-weight: 700; color: var(--text-sub); }
  .btn-logout {
    padding: 6px 12px; border: 1.5px solid var(--border); border-radius: 20px;
    font-size: 12px; font-weight: 600; background: transparent; cursor: pointer;
    color: var(--text-sub); font-family: inherit; transition: all .2s;
  }
  .btn-logout:hover { background: var(--border); }

  .main-content { padding: 20px 16px 100px; max-width: 520px; margin: 0 auto; }

  /* KIDS CARDS */
  .kids-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
  .kid-card {
    background: var(--card); border-radius: var(--radius); padding: 16px;
    box-shadow: var(--shadow); cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    border: 2px solid transparent; position: relative; overflow: hidden;
  }
  .kid-card:active { transform: scale(0.97); }
  .kid-card.selected { border-color: currentColor; }
  .kid-card.rey { --accent: var(--rey-color); --accent-light: var(--rey-light); color: var(--rey-color); }
  .kid-card.mika { --accent: var(--mika-color); --accent-light: var(--mika-light); color: var(--mika-color); }
  .kid-card .card-bg {
    position: absolute; top: -20px; right: -20px;
    width: 80px; height: 80px; border-radius: 50%;
    background: var(--accent-light); opacity: 0.8;
  }
  .kid-avatar {
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent-light); display: flex; align-items: center;
    justify-content: center; font-size: 22px; margin-bottom: 10px;
    position: relative;
  }
  .kid-name { font-size: 16px; font-weight: 800; color: var(--text); font-family: 'Nunito', sans-serif; }
  .kid-rank { font-size: 11px; color: var(--text-sub); margin-bottom: 8px; font-weight: 600; }
  .kid-points { font-size: 32px; font-weight: 900; font-family: 'Nunito', sans-serif; line-height: 1; }
  .kid-points-label { font-size: 12px; color: var(--text-sub); margin-top: 2px; }
  .kid-stars { display: flex; flex-wrap: wrap; gap: 2px; margin-top: 8px; min-height: 18px; }
  .kid-stars .star { font-size: 13px; }
  .kid-stars .extra { font-size: 10px; color: var(--text-sub); align-self: center; font-weight: 700; }

  /* ACTION PANEL */
  .action-panel {
    background: var(--card); border-radius: var(--radius); padding: 20px;
    box-shadow: var(--shadow); margin-bottom: 20px;
  }
  .action-title { font-size: 14px; font-weight: 800; color: var(--text); margin-bottom: 14px; }
  .action-kid-tabs { display: flex; gap: 8px; margin-bottom: 14px; }
  .action-kid-tab {
    flex: 1; padding: 8px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    font-size: 13px; font-weight: 700; background: transparent; cursor: pointer;
    font-family: inherit; color: var(--text-sub); transition: all .2s;
  }
  .action-kid-tab.active.rey { background: var(--rey-light); border-color: var(--rey-color); color: var(--rey-dark); }
  .action-kid-tab.active.mika { background: var(--mika-light); border-color: var(--mika-color); color: var(--mika-dark); }

  .points-quick { display: flex; gap: 6px; margin-bottom: 14px; flex-wrap: wrap; }
  .points-quick-btn {
    flex: 1; min-width: 48px; padding: 9px 6px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--bg); font-size: 14px;
    font-weight: 800; font-family: 'Nunito', sans-serif; cursor: pointer;
    color: var(--text); transition: all .15s;
  }
  .points-quick-btn.plus:hover, .points-quick-btn.plus.sel { background: var(--success-light); border-color: var(--success); color: var(--success); }
  .points-quick-btn.minus:hover, .points-quick-btn.minus.sel { background: var(--danger-light); border-color: var(--danger); color: var(--danger); }

  .custom-row { display: flex; gap: 8px; align-items: center; margin-bottom: 14px; }
  .custom-row label { font-size: 12px; color: var(--text-sub); white-space: nowrap; font-weight: 600; }
  .custom-input {
    flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; font-family: 'Nunito', sans-serif; font-weight: 800;
    color: var(--text); background: #fff; outline: none; transition: border-color .2s;
    text-align: center;
  }
  .custom-input:focus { border-color: #667eea; }
  .note-input {
    width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
    font-size: 13px; font-family: inherit; color: var(--text); background: #fff;
    outline: none; resize: none; transition: border-color .2s; margin-bottom: 14px;
    min-height: 64px;
  }
  .note-input:focus { border-color: #667eea; }
  .note-suggestions { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 14px; }
  .note-chip {
    padding: 5px 10px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 12px; background: var(--bg); cursor: pointer; color: var(--text-sub);
    font-family: inherit; font-weight: 600; transition: all .15s;
  }
  .note-chip:hover { background: #667eea; color: #fff; border-color: #667eea; }
  .btn-submit {
    width: 100%; padding: 13px; border-radius: var(--radius-sm); border: none;
    font-size: 15px; font-weight: 800; font-family: 'Nunito', sans-serif;
    cursor: pointer; transition: all .15s; color: #fff;
    background: linear-gradient(135deg, #667eea, #764ba2);
  }
  .btn-submit:active { transform: scale(0.98); opacity: 0.9; }
  .btn-submit.rey-bg { background: linear-gradient(135deg, var(--rey-color), var(--rey-dark)); }
  .btn-submit.mika-bg { background: linear-gradient(135deg, var(--mika-color), var(--mika-dark)); }

  /* HISTORY */
  .history-panel { background: var(--card); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
  .history-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .history-title { font-size: 14px; font-weight: 800; color: var(--text); }
  .filter-row { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 14px; }
  .filter-btn {
    padding: 5px 12px; border-radius: 20px; border: 1.5px solid var(--border);
    font-size: 12px; background: var(--bg); color: var(--text-sub); cursor: pointer;
    font-family: inherit; font-weight: 700; transition: all .15s;
  }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .history-list { display: flex; flex-direction: column; gap: 8px; }
  .history-item {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 14px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--bg);
    transition: background .15s;
  }
  .h-avatar {
    width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .h-avatar.rey { background: var(--rey-light); }
  .h-avatar.mika { background: var(--mika-light); }
  .h-info { flex: 1; min-width: 0; }
  .h-who { font-size: 11px; font-weight: 700; color: var(--text-sub); margin-bottom: 2px; }
  .h-note { font-size: 13px; color: var(--text); line-height: 1.4; word-break: break-word; }
  .h-date { font-size: 11px; color: var(--text-muted); margin-top: 3px; }
  .h-delta {
    font-size: 14px; font-weight: 900; font-family: 'Nunito', sans-serif;
    padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    align-self: center;
  }
  .h-delta.plus { background: var(--success-light); color: var(--success); }
  .h-delta.minus { background: var(--danger-light); color: var(--danger); }
  .empty-hist { text-align: center; padding: 32px 0; color: var(--text-muted); font-size: 14px; }

  /* SYNC STATUS */
  .sync-bar {
    display: flex; align-items: center; gap: 6px; padding: 8px 16px;
    background: #fff; border-top: 1px solid var(--border);
    font-size: 12px; color: var(--text-muted); position: fixed; bottom: 0; left: 0; right: 0;
    z-index: 100;
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }
  .sync-dot.offline { background: var(--danger); }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* TOAST */
  .toast {
    position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #1A1D27; color: #fff; padding: 10px 20px; border-radius: 24px;
    font-size: 13px; font-weight: 600; opacity: 0;
    transition: all .3s; z-index: 999; white-space: nowrap; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5);
    z-index: 500; align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal-box {
    background: #fff; border-radius: 20px; padding: 28px 24px;
    width: 100%; max-width: 340px; box-shadow: var(--shadow-md);
    text-align: center;
  }
  .modal-icon { font-size: 44px; margin-bottom: 12px; }
  .modal-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; font-family: 'Nunito', sans-serif; }
  .modal-desc { font-size: 14px; color: var(--text-sub); margin-bottom: 20px; line-height: 1.5; }
  .modal-actions { display: flex; gap: 10px; }
  .modal-btn {
    flex: 1; padding: 12px; border-radius: var(--radius-sm); font-size: 14px;
    font-weight: 700; font-family: inherit; cursor: pointer; border: none; transition: opacity .2s;
  }
  .modal-btn:active { opacity: 0.8; }
  .modal-btn.primary { background: linear-gradient(135deg, #667eea, #764ba2); color: #fff; }
  .modal-btn.secondary { background: var(--bg); color: var(--text-sub); }

  /* CONFETTI */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 998; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 8px; height: 8px; border-radius: 2px;
    animation: confettiFall 2s ease-in forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
</style>
</head>
<body>

<!-- ══════════ SETUP PAGE ══════════ -->
<div id="page-setup" class="page">
  <div class="setup-card">
    <div class="setup-logo">
      <span class="emoji">⭐</span>
      <h1>寶貝集點系統</h1>
      <p>首次設定，只需一次</p>
    </div>

    <div class="setup-section">
      <div class="setup-section-title">🔥 Firebase 設定</div>
      <div class="form-group">
        <label>Database URL</label>
        <input type="url" id="s-dbUrl" placeholder="https://xxx-default-rtdb.asia-southeast1.firebasedatabase.app">
      </div>
      <div class="setup-row">
        <div class="form-group">
          <label>API Key</label>
          <input type="text" id="s-apiKey" placeholder="AIzaSy...">
        </div>
        <div class="form-group">
          <label>Project ID</label>
          <input type="text" id="s-projectId" placeholder="kids-points-xxx">
        </div>
      </div>
      <div class="form-group">
        <label>App ID</label>
        <input type="text" id="s-appId" placeholder="1:123456:web:abc...">
      </div>
    </div>

    <div class="divider"></div>

    <div class="setup-section">
      <div class="setup-section-title">👶 小孩名字</div>
      <div class="setup-row">
        <div class="form-group">
          <label>第一個小孩</label>
          <input type="text" id="s-kid1" placeholder="Rey" value="Rey">
        </div>
        <div class="form-group">
          <label>第二個小孩</label>
          <input type="text" id="s-kid2" placeholder="Mika" value="Mika">
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="setup-section">
      <div class="setup-section-title">🔑 登入密碼</div>
      <div class="setup-row">
        <div class="form-group">
          <label>👨 爸爸密碼</label>
          <input type="password" id="s-dadPwd" placeholder="設定密碼">
        </div>
        <div class="form-group">
          <label>👩 媽媽密碼</label>
          <input type="password" id="s-momPwd" placeholder="設定密碼">
        </div>
      </div>
    </div>

    <button class="btn-setup" onclick="doSetup()">✨ 開始使用</button>
  </div>
</div>

<!-- ══════════ LOGIN PAGE ══════════ -->
<div id="page-login" class="page">
  <div class="login-card">
    <div class="login-logo">
      <span class="emoji">⭐</span>
      <h1>寶貝集點系統</h1>
      <p id="login-subtitle">請選擇身份登入</p>
    </div>

    <div class="login-tabs">
      <button class="login-tab active" id="tab-dad" onclick="switchLoginTab('dad')">
        <span>👨</span>爸爸
      </button>
      <button class="login-tab" id="tab-mom" onclick="switchLoginTab('mom')">
        <span>👩</span>媽媽
      </button>
    </div>

    <div class="form-group">
      <label>密碼</label>
      <input type="password" id="login-pwd" placeholder="輸入密碼" onkeydown="if(event.key==='Enter') doLogin()">
    </div>

    <button class="btn-login" onclick="doLogin()">登入</button>
    <button class="btn-faceid" id="btn-faceid" onclick="doFaceID()" style="display:none">
      <span>🔐</span> 使用 Face ID / 指紋登入
    </button>
    <span class="btn-reset-link" onclick="confirmReset()">重新設定系統</span>
  </div>
</div>

<!-- ══════════ MAIN PAGE ══════════ -->
<div id="page-main" class="page">
  <div class="topbar">
    <div class="topbar-title">⭐ 集點系統</div>
    <div class="topbar-user">
      <div class="topbar-avatar" id="topbar-avatar">👨</div>
      <span class="topbar-name" id="topbar-name">爸爸</span>
      <button class="btn-logout" onclick="doLogout()">登出</button>
    </div>
  </div>

  <div class="main-content">
    <!-- KIDS CARDS -->
    <div class="kids-grid">
      <div class="kid-card rey" id="card-kid1" onclick="selectKid(0)">
        <div class="card-bg"></div>
        <div class="kid-avatar">🌊</div>
        <div class="kid-name" id="kname-0">Rey</div>
        <div class="kid-rank" id="krank-0">初學者</div>
        <div class="kid-points rey" id="kpts-0">0</div>
        <div class="kid-points-label">點</div>
        <div class="kid-stars" id="kstars-0"></div>
      </div>
      <div class="kid-card mika" id="card-kid2" onclick="selectKid(1)">
        <div class="card-bg"></div>
        <div class="kid-avatar">🌸</div>
        <div class="kid-name" id="kname-1">Mika</div>
        <div class="kid-rank" id="krank-1">初學者</div>
        <div class="kid-points mika" id="kpts-1">0</div>
        <div class="kid-points-label">點</div>
        <div class="kid-stars" id="kstars-1"></div>
      </div>
    </div>

    <!-- ACTION PANEL -->
    <div class="action-panel">
      <div class="action-title">📝 新增紀錄</div>
      <div class="action-kid-tabs">
        <button class="action-kid-tab active rey" id="akid-0" onclick="selectKid(0)">🌊 <span id="aname-0">Rey</span></button>
        <button class="action-kid-tab mika" id="akid-1" onclick="selectKid(1)">🌸 <span id="aname-1">Mika</span></button>
      </div>

      <div style="font-size:12px;color:var(--text-sub);font-weight:700;margin-bottom:8px;">快速加點</div>
      <div class="points-quick" id="quick-plus">
        <button class="points-quick-btn plus" onclick="setDelta(1)">+1</button>
        <button class="points-quick-btn plus" onclick="setDelta(2)">+2</button>
        <button class="points-quick-btn plus" onclick="setDelta(5)">+5</button>
        <button class="points-quick-btn plus" onclick="setDelta(10)">+10</button>
      </div>
      <div style="font-size:12px;color:var(--text-sub);font-weight:700;margin-bottom:8px;">扣點</div>
      <div class="points-quick" id="quick-minus">
        <button class="points-quick-btn minus" onclick="setDelta(-1)">-1</button>
        <button class="points-quick-btn minus" onclick="setDelta(-2)">-2</button>
        <button class="points-quick-btn minus" onclick="setDelta(-5)">-5</button>
      </div>

      <div class="custom-row">
        <label>自訂點數</label>
        <input type="number" class="custom-input" id="delta-input" value="1" min="-100" max="100">
      </div>

      <div style="font-size:12px;color:var(--text-sub);font-weight:700;margin-bottom:6px;">備注說明</div>
      <div class="note-suggestions">
        <button class="note-chip" onclick="setNote('主動幫忙做家事')">🏠 幫忙家事</button>
        <button class="note-chip" onclick="setNote('自動完成作業')">📚 完成作業</button>
        <button class="note-chip" onclick="setNote('表現有禮貌')">😊 有禮貌</button>
        <button class="note-chip" onclick="setNote('不聽話')">😤 不聽話</button>
        <button class="note-chip" onclick="setNote('和手足分享玩具')">🤝 懂得分享</button>
        <button class="note-chip" onclick="setNote('吃飯不挑食')">🍱 不挑食</button>
        <button class="note-chip" onclick="setNote('準時刷牙洗臉')">🦷 按時刷牙</button>
        <button class="note-chip" onclick="setNote('打架或吵架')">🥊 打架吵架</button>
      </div>
      <textarea class="note-input" id="note-input" placeholder="說明表現原因..."></textarea>
      <button class="btn-submit" id="btn-submit" onclick="submitRecord()">確認新增</button>
    </div>

    <!-- HISTORY -->
    <div class="history-panel" style="margin-top:20px;">
      <div class="history-header">
        <div class="history-title">📋 紀錄歷史</div>
      </div>
      <div class="filter-row">
        <button class="filter-btn active" id="f-all" onclick="setFilter('all')">全部</button>
        <button class="filter-btn" id="f-kid0" onclick="setFilter('kid0')">🌊 <span id="fname-0">Rey</span></button>
        <button class="filter-btn" id="f-kid1" onclick="setFilter('kid1')">🌸 <span id="fname-1">Mika</span></button>
        <button class="filter-btn" id="f-plus" onclick="setFilter('plus')">加點</button>
        <button class="filter-btn" id="f-minus" onclick="setFilter('minus')">扣點</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="empty-hist">還沒有紀錄</div>
      </div>
    </div>
  </div>

  <div class="sync-bar">
    <div class="sync-dot" id="sync-dot"></div>
    <span id="sync-text">已連線，即時同步中</span>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal-box">
    <div class="modal-icon" id="modal-icon">🔐</div>
    <div class="modal-title" id="modal-title">啟用 Face ID</div>
    <div class="modal-desc" id="modal-desc">是否要啟用 Face ID / 指紋快速登入？</div>
    <div class="modal-actions">
      <button class="modal-btn secondary" id="modal-cancel" onclick="closeModal()">取消</button>
      <button class="modal-btn primary" id="modal-ok" onclick="modalOk()">確定</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>
<div class="confetti-container" id="confetti"></div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════
let config = null;
let db = null;
let currentUser = null; // 'dad' | 'mom'
let selectedKid = 0;
let currentFilter = 'all';
let modalCallback = null;
let kidNames = ['Rey', 'Mika'];
let kidPoints = [0, 0];
let historyRecords = [];
let unsubscribe = null;

const RANKS = [
  [0, '初學者 🌱'],
  [10, '小幫手 🌟'],
  [25, '表現優秀 🏅'],
  [50, '超級明星 ⭐'],
  [100, '傳說冠軍 🏆'],
];

function getRank(pts) {
  let r = RANKS[0][1];
  for (const [min, label] of RANKS) { if (pts >= min) r = label; }
  return r;
}

// ════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════
window.onload = () => {
  const saved = localStorage.getItem('kps_config');
  if (!saved) { showPage('setup'); return; }
  try {
    config = JSON.parse(saved);
    kidNames = config.kidNames || ['Rey', 'Mika'];
    initFirebase();
    checkBiometric();
    showPage('login');
  } catch(e) { showPage('setup'); }
};

function initFirebase() {
  if (window._fbApp) return;
  try {
    window._fbApp = firebase.initializeApp({
      apiKey: config.apiKey,
      authDomain: config.projectId + '.firebaseapp.com',
      databaseURL: config.databaseURL,
      projectId: config.projectId,
      appId: config.appId,
    });
    db = firebase.database();
  } catch(e) { console.warn('Firebase init failed', e); }
}

// ════════════════════════════════════════════════
//  SETUP
// ════════════════════════════════════════════════
function doSetup() {
  const dbUrl = v('s-dbUrl');
  const apiKey = v('s-apiKey');
  const projectId = v('s-projectId');
  const appId = v('s-appId');
  const kid1 = v('s-kid1') || 'Rey';
  const kid2 = v('s-kid2') || 'Mika';
  const dadPwd = v('s-dadPwd');
  const momPwd = v('s-momPwd');

  if (!dbUrl || !apiKey || !projectId || !appId) { toast('請填入完整的 Firebase 設定'); return; }
  if (!dadPwd || !momPwd) { toast('請設定爸爸和媽媽的密碼'); return; }

  config = { databaseURL: dbUrl, apiKey, projectId, appId, kidNames: [kid1, kid2], dadPwd, momPwd };
  localStorage.setItem('kps_config', JSON.stringify(config));
  kidNames = [kid1, kid2];
  initFirebase();
  toast('設定完成！');
  setTimeout(() => showPage('login'), 800);
}

// ════════════════════════════════════════════════
//  LOGIN
// ════════════════════════════════════════════════
let loginTab = 'dad';
function switchLoginTab(who) {
  loginTab = who;
  el('tab-dad').classList.toggle('active', who === 'dad');
  el('tab-mom').classList.toggle('active', who === 'mom');
  el('login-pwd').value = '';
  el('login-pwd').focus();
  checkBiometric();
}

function checkBiometric() {
  const key = 'kps_bio_' + loginTab;
  const hasBio = localStorage.getItem(key) === '1';
  const supported = window.PublicKeyCredential !== undefined;
  el('btn-faceid').style.display = (hasBio && supported) ? 'flex' : 'none';
}

function doLogin() {
  const pwd = v('login-pwd');
  const expected = loginTab === 'dad' ? config.dadPwd : config.momPwd;
  if (pwd !== expected) { toast('密碼錯誤，請再試一次'); return; }
  loginSuccess(loginTab);
  offerBiometric(loginTab);
}

function loginSuccess(who) {
  currentUser = who;
  el('topbar-avatar').textContent = who === 'dad' ? '👨' : '👩';
  el('topbar-name').textContent = who === 'dad' ? '爸爸' : '媽媽';
  el('login-pwd').value = '';
  kidNames = config.kidNames || ['Rey', 'Mika'];
  updateKidNameUI();
  showPage('main');
  startSync();
}

function doLogout() {
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }
  currentUser = null;
  showPage('login');
}

// ════════════════════════════════════════════════
//  BIOMETRIC
// ════════════════════════════════════════════════
function offerBiometric(who) {
  const key = 'kps_bio_' + who;
  if (localStorage.getItem(key) === '1') return;
  if (!window.PublicKeyCredential) return;
  showModal('🔐', '啟用快速登入', '是否啟用 Face ID / 指紋快速登入？\n\n您的生物資訊只存在裝置上，不會上傳。', () => {
    registerBiometric(who);
  });
}

async function registerBiometric(who) {
  try {
    await navigator.credentials.create({
      publicKey: {
        challenge: new Uint8Array(32),
        rp: { name: '集點系統' },
        user: { id: new TextEncoder().encode(who), name: who, displayName: who === 'dad' ? '爸爸' : '媽媽' },
        pubKeyCredParams: [{ type: 'public-key', alg: -7 }],
        authenticatorSelection: { userVerification: 'required' },
        timeout: 60000,
      }
    });
    localStorage.setItem('kps_bio_' + who, '1');
    toast('已啟用 Face ID / 指紋登入 ✓');
  } catch(e) { console.log('biometric register failed', e); }
}

async function doFaceID() {
  try {
    await navigator.credentials.get({
      publicKey: {
        challenge: new Uint8Array(32),
        userVerification: 'required',
        timeout: 60000,
      }
    });
    loginSuccess(loginTab);
  } catch(e) { toast('Face ID 驗證失敗，請用密碼登入'); }
}

// ════════════════════════════════════════════════
//  FIREBASE SYNC
// ════════════════════════════════════════════════
function setSyncStatus(status) {
  const dot = el('sync-dot');
  const txt = el('sync-text');
  dot.className = 'sync-dot' + (status === 'offline' ? ' offline' : status === 'syncing' ? ' syncing' : '');
  txt.textContent = status === 'offline' ? '離線中' : status === 'syncing' ? '同步中...' : '已連線，即時同步中';
}

function startSync() {
  if (!db) { setSyncStatus('offline'); return; }
  setSyncStatus('syncing');

  const ref = db.ref('data');
  unsubscribe = ref.on('value', snap => {
    const data = snap.val() || {};
    kidPoints = [data.pts0 || 0, data.pts1 || 0];
    historyRecords = data.history ? Object.values(data.history).sort((a,b) => b.ts - a.ts) : [];
    renderKidCards();
    renderHistory();
    setSyncStatus('online');
  }, err => {
    console.error(err);
    setSyncStatus('offline');
  });
}

function writeData(updates) {
  if (!db) { toast('Firebase 未連線，無法儲存'); return; }
  setSyncStatus('syncing');
  db.ref('data').update(updates).catch(e => {
    toast('儲存失敗：' + e.message);
    setSyncStatus('offline');
  });
}

// ════════════════════════════════════════════════
//  KID SELECTION
// ════════════════════════════════════════════════
function selectKid(idx) {
  selectedKid = idx;
  el('card-kid1').classList.toggle('selected', idx === 0);
  el('card-kid2').classList.toggle('selected', idx === 1);
  el('akid-0').classList.toggle('active', idx === 0);
  el('akid-1').classList.toggle('active', idx === 1);
  const btn = el('btn-submit');
  btn.className = 'btn-submit ' + (idx === 0 ? 'rey-bg' : 'mika-bg');
  clearQuickSel();
}

// ════════════════════════════════════════════════
//  POINTS ACTION
// ════════════════════════════════════════════════
let selectedDelta = null;

function setDelta(val) {
  selectedDelta = val;
  el('delta-input').value = val;
  document.querySelectorAll('.points-quick-btn').forEach(b => b.classList.remove('sel'));
  document.querySelectorAll('.points-quick-btn').forEach(b => {
    const bval = parseInt(b.textContent);
    if (bval === val) b.classList.add('sel');
  });
}

function clearQuickSel() {
  document.querySelectorAll('.points-quick-btn').forEach(b => b.classList.remove('sel'));
}

function setNote(text) {
  el('note-input').value = text;
}

function submitRecord() {
  const delta = parseInt(el('delta-input').value) || 0;
  const note = el('note-input').value.trim() || (delta > 0 ? '表現良好' : '需要改進');
  if (delta === 0) { toast('點數不能為 0'); return; }

  const newPts = Math.max(0, kidPoints[selectedKid] + delta);
  const prevPts = kidPoints[selectedKid];

  const record = {
    kid: selectedKid,
    delta,
    note,
    who: currentUser === 'dad' ? '爸爸' : '媽媽',
    ts: Date.now(),
    date: fmtDate(new Date()),
  };

  const pushKey = db ? db.ref('data/history').push().key : 'local_' + Date.now();
  const updates = {};
  updates['pts' + selectedKid] = newPts;
  updates['history/' + pushKey] = record;
  writeData(updates);

  el('delta-input').value = 1;
  el('note-input').value = '';
  clearQuickSel();
  selectedDelta = null;

  toast((delta > 0 ? '🎉 +' : '😢 ') + delta + ' 點 → ' + kidNames[selectedKid]);

  // confetti for adding points
  if (delta > 0) spawnConfetti();

  // star milestone
  const prevStars = Math.floor(prevPts / 10);
  const newStars = Math.floor(newPts / 10);
  if (newStars > prevStars) {
    setTimeout(() => toast('⭐ ' + kidNames[selectedKid] + ' 獲得第 ' + newStars + ' 顆星！'), 600);
  }
}

// ════════════════════════════════════════════════
//  RENDER
// ════════════════════════════════════════════════
function updateKidNameUI() {
  for (let i = 0; i < 2; i++) {
    el('kname-' + i).textContent = kidNames[i];
    el('aname-' + i).textContent = kidNames[i];
    el('fname-' + i).textContent = kidNames[i];
  }
}

function renderKidCards() {
  for (let i = 0; i < 2; i++) {
    const pts = kidPoints[i];
    el('kpts-' + i).textContent = pts;
    el('krank-' + i).textContent = getRank(pts);
    const starsEl = el('kstars-' + i);
    const stars = Math.floor(pts / 10);
    const shown = Math.min(stars, 5);
    starsEl.innerHTML = '';
    for (let s = 0; s < shown; s++) {
      const sp = document.createElement('span');
      sp.className = 'star'; sp.textContent = '⭐';
      starsEl.appendChild(sp);
    }
    if (stars > 5) {
      const ex = document.createElement('span');
      ex.className = 'extra'; ex.textContent = '+' + (stars - 5);
      starsEl.appendChild(ex);
    }
  }
}

function renderHistory() {
  const listEl = el('history-list');
  let records = [...historyRecords];

  if (currentFilter === 'kid0') records = records.filter(r => r.kid === 0);
  else if (currentFilter === 'kid1') records = records.filter(r => r.kid === 1);
  else if (currentFilter === 'plus') records = records.filter(r => r.delta > 0);
  else if (currentFilter === 'minus') records = records.filter(r => r.delta < 0);

  if (!records.length) {
    listEl.innerHTML = '<div class="empty-hist">暫無紀錄</div>';
    return;
  }

  listEl.innerHTML = records.slice(0, 80).map(r => {
    const cls = r.kid === 0 ? 'rey' : 'mika';
    const emoji = r.kid === 0 ? '🌊' : '🌸';
    const dclass = r.delta > 0 ? 'plus' : 'minus';
    const dtxt = (r.delta > 0 ? '+' : '') + r.delta + ' 點';
    const whoEmoji = r.who === '爸爸' ? '👨' : '👩';
    return `<div class="history-item">
      <div class="h-avatar ${cls}">${emoji}</div>
      <div class="h-info">
        <div class="h-who">${kidNames[r.kid] || r.kid} · ${whoEmoji} ${r.who || ''}</div>
        <div class="h-note">${r.note}</div>
        <div class="h-date">${r.date}</div>
      </div>
      <div class="h-delta ${dclass}">${dtxt}</div>
    </div>`;
  }).join('');
}

function setFilter(f) {
  currentFilter = f;
  ['all','kid0','kid1','plus','minus'].forEach(k => {
    const btn = el('f-' + k);
    if (btn) btn.classList.toggle('active', k === f);
  });
  renderHistory();
}

// ════════════════════════════════════════════════
//  RESET
// ════════════════════════════════════════════════
function confirmReset() {
  showModal('⚠️', '重新設定', '這將清除本機設定，你需要重新填入 Firebase 資訊和密碼。\n\n雲端資料不會刪除。', () => {
    localStorage.clear();
    location.reload();
  });
}

// ════════════════════════════════════════════════
//  MODAL
// ════════════════════════════════════════════════
function showModal(icon, title, desc, onOk) {
  el('modal-icon').textContent = icon;
  el('modal-title').textContent = title;
  el('modal-desc').textContent = desc;
  modalCallback = onOk;
  el('modal').classList.add('show');
}
function closeModal() { el('modal').classList.remove('show'); modalCallback = null; }
function modalOk() { closeModal(); if (modalCallback) modalCallback(); }

// ════════════════════════════════════════════════
//  CONFETTI
// ════════════════════════════════════════════════
const COLORS = ['#F5C842','#3DBFA8','#F97BA0','#667eea','#10B981','#EF4444','#764ba2'];
function spawnConfetti() {
  const container = el('confetti');
  container.innerHTML = '';
  for (let i = 0; i < 36; i++) {
    const p = document.createElement('div');
    p.className = 'confetti-piece';
    p.style.cssText = `
      left:${Math.random()*100}%;
      background:${COLORS[Math.floor(Math.random()*COLORS.length)]};
      animation-delay:${Math.random()*0.5}s;
      animation-duration:${1.5 + Math.random()}s;
      width:${6+Math.random()*6}px; height:${6+Math.random()*6}px;
      border-radius:${Math.random()>0.5?'50%':'3px'};
    `;
    container.appendChild(p);
  }
  setTimeout(() => container.innerHTML = '', 3000);
}

// ════════════════════════════════════════════════
//  UTILS
// ════════════════════════════════════════════════
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  el('page-' + name).classList.add('active');
  if (name === 'main') { selectKid(0); }
}
function el(id) { return document.getElementById(id); }
function v(id) { return el(id).value.trim(); }
function toast(msg) {
  const t = el('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(window._toastTimer);
  window._toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}
function fmtDate(d) {
  return d.getFullYear() + '/' +
    String(d.getMonth()+1).padStart(2,'0') + '/' +
    String(d.getDate()).padStart(2,'0') + ' ' +
    String(d.getHours()).padStart(2,'0') + ':' +
    String(d.getMinutes()).padStart(2,'0');
}
</script>
</body>
</html>
